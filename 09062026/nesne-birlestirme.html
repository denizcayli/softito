<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div>
        <h1>Spread Operator (dağıtma)</h1>
    </div>
    <div><br>
    <h3>Dizi Kopyalama Referanası</h3>
    <div>
        <button id="btn-copy-ref">Referans Kopyalama(Orijinali etkiler)</button>
        <button id="btn-copy-spread">Spread Kopyalama(Güvenli)</button>
    </div><br>
 </div>

    <div>
        <span>Orijinal Dizi</span>
        <div id="orig-arr">[]</div>
    </div><br>

    <div>
        <span>Kopya Dizi:</span>
        <div id="copy-arr" class="result-box">[]</div>
    </div><br>

    <div>
        <h3>2.Nesne Birleştirme</h3>
        <button id="btn-merge-obj">Nesneleri Birleştir</button><br>
        <div id="merge-result"><br>
            Nesne Birleştirilemedi..
        </div>
    </div>

    <script>
        let orijinal=['Apple','Microsoft'];

        document.getElementById('orig-arr').innerText=JSON.stringify(orijinal);
        
        document.getElementById('btn-copy-ref').addEventListener('click',()=>{
            orijinal=['Apple', 'Microsoft'];
            const kopya=orijinal;
            kopya.push('Nokia');
            document.getElementById('orig-arr').innerText=JSON.stringify(orijinal);
            document.getElementById('copy-arr').innerText=JSON.stringify(kopya);
        })

        document.getElementById('btn-copy-spread').addEventListener('click',()=>{
            orijinal=['Elma','Armut'];
            const kopya = [...orijinal];
            kopya.push('Kiraz');
            document.getElementById('orig-arr').innerText=JSON.stringify(orijinal);
            document.getElementById('copy-arr').innerText=JSON.stringify(kopya);
        })

        document.getElementById('btn-merge-obj').addEventListener('click', () => {
        const varsayilan = {tema: 'koyu', dil: 'TR'};
        const kullanici = {dil: 'EN'};
        const sonNesne = {...varsayilan, ...kullanici};
        document.getElementById('merge-result').innerHTML =`<div>${JSON.stringify(sonNesne)}</div>`

    })
    </script>
</body>
</html>
