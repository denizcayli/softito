<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Türkçe karakterlerin web sitesinde bozuk görünmesini engeller.-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- mobil uyumluluk sağlar. -->
    <title>Proje Kart</title>
    <!-- Başlık kısmı -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css"/>
    <!--Tailwindi projeye bağladık -->
  </head>

  <body class="bg-indigo-50 text-gray-800 font-sans min-h-screen p-8 flex flex-col items-center justify-center gap-6">
    <!-- bg background açılımıdır. Arkaplan rengini açık bir mor (indigo) yapar.
     text-gray-800 genel yazı rengini koyu bir gri yapar
     font-sans Her tarayıcı varsayılan fontunu çalıştırır.
     min-h-screen minimum height screen sayfanın yüksekliğini en az kullanıcıının ekran boyutu kadar yapar.
     p-8 padding 8 sayfanın dört bir yanından içeriye doğru içe boşluk verir.
     flex flex-col elemanları dikey sıralar
     items-center yatayda ortalar
     justify-center dikeyde ortalar -->

    <div class="text-center max-w-md">
      <!--text-center yazıları ortalar
       max-w-md laptop boyutundadır. -->

      <div>
        <h1 class="text-xl font-bold text-gray-900 mb-2">Fiyatlandırma Kartı Flex Column</h1>
        <!--text-xl büyük yazı, font-bold kalın, text-gray-900 neredeyse siyah, mb-2 margin bottom 2 — yani alttan dış boşluk -->

        <p class="text-xs text-gray-500">Kart elemanları üst üste sıralamak için flex-col, öne çıkan rozeti en
          üstte göstermek için ise order-first sınıfı kullanacağız</p>
          <!--text-xs küçük yazı, text-gray-500 soluk gri -->

      </div>

      <div class="w-full max-w-xs bg-white border border-gray-200 rounded-2xl p-6 flex flex-col gap-4 shadow-sm"><div>
        <!--w-full tam genişlik demektir
         max-w-xs telefon boyutudur.
         bg-white kartın içi beyaz renkte olacak.
         border border-gray-200 ince açık gri çerçeve girdik.
         rounded-2xl köşeler çok yuvarlak 2xl boyutunda 
         p-6 6 piksellik içten boşluk
         flex flex-col (column) içindekiler kısmı dikey sıralanır
         gap-4 aralarında boşluk
         shadow-sm hafif gölge sm(small)-->
        
        <h2 class="text-sm font-bold text-gray-800 uppercase tracking-wider"></h2>
         <!--uppercase harfleri büyük yapar, tracking-wider harfler arası belirgin bir boşluk açar -->
        
        <p class="text-2xl font-extrabold text-gray-900 mt-1">99 TL / Ay</p>
        <!--text-2xl büyük fiyat yazısı, font-extrabold çok kalın font, mt-1 margin top-1 yani üstten dış boşluk -->
        </div>

        <div class="px-2.5 py-1 bg-indigo-100 border border-indigo-200 text-indigo-700 text-[9px] font-extrabold rounded-full self-start order-first uppercase tracking-wide">
          En Popüler Paket (order-first)

          <!--px-2.5 py-1 yatay ve dikey içe boşluk,
           bg-indigo-100 açık mor arkaplan
           border border-indigo-200 biraz daha koyu mor çerçeve
           text-indigo-700 koyu mor yazı
           text-[9px] 9px hazırda olmadığımız için istediğimiz bir değer girdiğimizde köşeli parantez kullanıyoruz.
           rounded-full tam yuvarlak oluyor
           self-start sadece kendi içeriği kadar yer kaplar, sola yaslanır
           order-first html'de 2. sırada ama bunu ekleyince görsel olarak en üste çıktı
           uppercase tracking-wide büyük harf, harf aralığı belirgin açık -->
        </div> 

        <div class="text-xs text-gray-500 space-y-2 border border-gray-100 pt-4">
          <!--text-xs küçük yazı, text-gray-500 soluk gri
           space-y-2 içindeki p'lerin arasına otomatik boşluk koyar, tek tek margin yazmadık
           border border-gray-100 çok ince açık çizgi, listeyi ayırıyor
           pt-4 üstten boşluk, yazı çizgiye yapışması -->

          <p>1 Sınırsız Proje</p>
          <p>25 tane kişisel proje</p>
          <p>Grup Çalışması</p>
          <!--Metinler -->

        </div>

        <button class="w-full py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg text-xs font-semibold transition-colors mt-2">Satın Al</button>
        <!--w-full buton kartın tüm genişliği
         py-2 üst alt boşluk
         bg-indigo-600 koyu mor
         hover bg-indigo-700 mouse imlecimiz üzerine gelince daha da koyulaşır
         text-white beyaz yazı
         rounded-lg hafif yuvarlak köşe
         text-xs font-semibold küçük ama kalın yazı
         transition-colors renk değişimi yumuşak geçer, ani değil
         mt-2 margin top-2 üstten dış boşluk  -->
      
      </div>
    </div>
  </body>
</html>
