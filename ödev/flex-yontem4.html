<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yöntem 4 - Auto-fit Grid Sistemi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css"/>
</head>
<body class="bg-slate-100 p-8 flex flex-col items-center">

    <div class="max-w-xl w-full bg-white p-6 rounded shadow">
        <h1 class="text-xl font-bold mb-4">CSS Saf Grid (Auto-fit)</h1>
        
        <div>
            <div class="bg-slate-50 p-3 border rounded" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 1rem;">
                <div class="bg-purple-500 text-white p-3 rounded text-center">Kutu1</div>
                <div class="bg-blue-500 text-white p-3 rounded text-center">Kutu2</div>
                <div class="bg-pink-500 text-white p-3 rounded text-center">Kutu3</div>
            </div>
        </div>
    </div>

</body>
</html>
