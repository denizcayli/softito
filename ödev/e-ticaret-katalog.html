<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Ticaret Sepet Yönetimi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css">
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body class="p-6 bg-gray-200">

<div class="p-6 bg-white max-w-4xl mx-auto rounded shadow">
    <h1 class="text-xl font-bold mb-4">E-Ticaret Sepet Yönetimi</h1>
    
    <div class="p-4 border rounded mb-4">
        <h2 class="text-lg font-bold mb-2">Ürün Kataloğu</h2>
        <div class="mb-2">
            <input type="text" id="search-input" placeholder="Ürün Adı" class="p-2 border rounded w-full md:w-1/3">
        </div>
        <button id="btn-search" class="p-2 bg-blue-500 text-white rounded hover:bg-blue-600">Katalog Güncelle</button>
        
        <div class="mt-4 space-y-2" id="product-list">
            <p class="text-gray-500">Ürün Listesini yüklemek için butona tıklayın</p>
        </div>
    </div>

    <div class="p-4 border rounded mb-4">
        <h2 class="text-lg font-bold mb-2">Alışveriş Sepetim</h2>
        <ul class="list-disc pl-5 space-y-1" id="cart-list">
            <li>Sepetiniz Boş</li>
        </ul>
        <div class="mt-2 font-bold">
            Toplam Tutar: <span id="cart-total">0</span> TL
        </div>
        <button id="btn-checkout" class="p-2 bg-green-500 text-white rounded mt-2 hover:bg-green-600">Alışverişi Tamamla</button>
    </div>

    <div id="status" class="p-2 border rounded bg-gray-50">
        Sistem hazır
    </div>
</div>

<script>
    const yedekUrunler=[
        {"id":1,"title":'Akıllı Telefon','kategori':'Elektronik','fiyat':'15000','stok':5},
        {"id":2,"title":'Ceket','kategori':'Giyim','fiyat':'5000','stok':0},
        {"id":3,"title":'Kuru Fasülye','kategori':'Yemek','fiyat':'150000','stok':2},
        {"id":4,"title":'Gömlek','kategori':'Giyim','fiyat':'200','stok':1},
        {"id":5,"title":'Saat','kategori':'Elektronik','fiyat':'52000','stok':5},
        {"id":6,"title":'Şapka','kategori':'Giyim','fiyat':'3000','stok':0},
        {"id":7,"title":'Pilav','kategori':'Yemek','fiyat':'2345000','stok':1},
        {"id":8,"title":'Köfte','kategori':'Yemek','fiyat':'123400','stok':2},
        {"id":9,"title":'Spor Ayakkabı','kategori':'Ayakkabı','fiyat':'1540','stok':5},
        {"id":10,"title":'Bilgisayar','kategori':'Elektronik','fiyat':'454000','stok':5}
    ];

    let sepet = [];
    let aktifUrunler = []; // API'den veya yedekten gelen o anki güncel listeyi burada tutacağız.

    const urunleriSorgula=async()=>{
        const searchVal=document.getElementById('search-input').value.toLowerCase();
        const listDiv=document.getElementById('product-list');
        const status=document.getElementById('status');

        status.innerText="Ürünler Listeleniyor...";
        status.className='p-2 border bg-yellow-50';

        try{
            const response = await axios.get('https://kodusta.com/api/urunler.json');
            aktifUrunler = response.data;
        }catch(hata){
            console.warn('Cors hatası veya bağlantı hatası, yedek listeye dönülüyor.');
            aktifUrunler = yedekUrunler;
        }

        const filtrelenmis=aktifUrunler.filter(u=>u.title.toLowerCase().includes(searchVal));

        listDiv.innerHTML="";
        if(filtrelenmis.length === 0){ 
            listDiv.innerHTML='<p class="p-2 text-red-500">Ürün bulunamadı</p>';
            status.className='p-2 border bg-red-50';
            status.innerText="Arama sonucu ürün bulunamadı.";
            return;
        }

        filtrelenmis.forEach(urun=>{
            const itemDiv=document.createElement('div');
            itemDiv.className="p-2 border my-1 rounded flex justify-between items-center bg-gray-50";

            itemDiv.innerHTML=`
                <div>
                    <strong>${urun.title}</strong> - Kategori: ${urun.kategori}<br>
                    <span class="text-sm text-gray-600">Fiyat: ${urun.fiyat} TL | Stok: ${urun.stok > 0 ? urun.stok : 'Tükenmiş'}</span>
                </div>
                <button class="p-1 bg-yellow-400 font-semibold text-xs rounded p-2 hover:bg-yellow-500" onclick="sepeteEkleTiklandi(${urun.id})">Sepete Ekle</button>
            `;

            listDiv.appendChild(itemDiv);
        });
        status.className='p-2 border bg-green-50';
        status.innerText="Katalog güncellendi.";
    }

    const stokKontrolEt=(urun)=>{
        return new Promise((resolve,reject)=>{
            setTimeout(()=>{
                if(urun && urun.stok>0){
                    resolve('Ürün stokta mevcut sepete ekleniyor');
                }else{
                    reject(`Hata: ${urun ? urun.title : 'Ürün'} stokta kalmadığı için sepete eklenemedi`);
                }
            },500)
        });
    }

    const sepetiGuncelle=(callback)=>{
        const cartList=document.getElementById('cart-list');
        cartList.innerHTML='';
        
        if (sepet.length === 0) {
            cartList.innerHTML = '<li>Sepetiniz Boş</li>';
        } else {
            sepet.forEach(item=>{
                const li = document.createElement('li');
                li.innerText=`${item.title} - ${item.fiyat} TL`;
                cartList.appendChild(li);
            });
        }
        
        const toplam = sepet.reduce((toplam,item)=>toplam+Number(item.fiyat),0);
        callback(toplam);
    }

    window.sepeteEkleTiklandi=async(urunId)=>{
        const status=document.getElementById('status');
        status.innerText="Stok Sorgulanıyor...";
        status.className="p-2 border bg-yellow-50";

        //Ekrandaki ürün listesi ile sepete gönderilen listenin aynı olması  için aktif ürünler değişkenini kullandık. Böylece ayakkabı seçince sepete başka bir şey çıkmıyor yine ayakkabı gitmesini sağladık eskiden pilav vs gözüküyordu..
        const urun=aktifUrunler.find(u=>u.id===urunId) || yedekUrunler.find(u=>u.id===urunId);

        try{
            const stokMesaji=await stokKontrolEt(urun);
            sepet.push(urun);
            sepetiGuncelle((faturaTutari)=>{
                document.getElementById('cart-total').innerText=faturaTutari;
                status.className='p-2 bg-green-200 border border-green-400 rounded';
                status.innerText=`${urun.title} başarıyla sepete eklendi. Toplam Sepet Tutarınız: ${faturaTutari} TL`;
            })

        } catch(hata){
            status.className="p-2 bg-red-200 border border-red-400 rounded";
            status.innerText=hata.message ? hata.message : hata;
        }
    }

    const siparisiTamamla=async()=>{
        const status=document.getElementById('status');
        if(sepet.length===0){
            status.className="p-2 bg-red-200 border border-red-400 rounded";
            status.innerText="Hata: Sepetiniz boş olduğu için sipariş veremezsiniz!.";
            return;
        }

        status.innerText="Siparişiniz Sunucuya (satıcıya) gönderiliyor..";
        status.className="p-2 border bg-blue-50";

        try{
            const response=await fetch('https://jsonplaceholder.typicode.com/posts',{
                method:'POST',
                headers:{
                    'Content-Type':'application/json'
                },
                body:JSON.stringify({
                    siparisler:sepet,
                    toplamTutar:Number(document.getElementById('cart-total').innerText)
                })
            });

            if(!response.ok){
                throw new Error('Sipariş sunucu tarafından reddedildi');
            }

            const cevap=await response.json();
            status.className='p-2 bg-green-200 border border-green-400 rounded';
            status.innerHTML=`Sipariş Başarıyla Alındı! Sipariş Kodu: ${cevap.id} (Sepetiniz Sıfırlandı)`;

            sepet=[];
            sepetiGuncelle((faturaTutari)=>{
                document.getElementById('cart-total').innerText=faturaTutari;
            });

        } catch(hata){
            status.className="p-2 bg-red-200 border border-red-400 rounded";
            status.innerText="Sipariş Hatası: "+hata.message;
        }
    }

    document.getElementById('btn-search').addEventListener('click',urunleriSorgula);
    document.getElementById('btn-checkout').addEventListener('click',siparisiTamamla);
</script>
    
</body>
</html>
