<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dinamik Sayaç Projesi</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="bg-gray-100 min-h-screen flex items-center justify-center">
    
    <div 
      id="box" 
      class="p-8 rounded-xl shadow text-center transition-colors duration-300">
      
      <h1 class="text-4xl font-bold text-indigo-500 my-4 mb-2">Canlı Sayaç</h1>
      
      <div id="number" class="text-4xl text-blue-400 my-4">0</div>
      
      <div class="flex gap-4 justify-center">
        <button 
          onclick="change(-1)" 
          class="bg-red-500 text-white px-4 rounded font-bold">-</button>
        <button 
          onclick="change(1)" 
          class="bg-green-500 text-white px-4 rounded font-bold">+</button>
      </div>
    </div>

    <script>
      let count = 0;
      const box = document.getElementById("box");
      const number = document.getElementById("number");
      function change(e) {
        count += e; 
        number.textContent = count;

        let opacity = Math.min(Math.abs(count) / 10, 1);
        if (count > 0) {
          // Pozitif Yeşil
          box.style.backgroundColor = `rgba(34, 197, 94, ${opacity})`;
          
        } else if (count < 0) {
          // Negatif Kısım Kırmızı Renk
          box.style.backgroundColor = `rgba(239, 68, 68, ${opacity})`;
          
        } else {
          box.style.backgroundColor = "rgba(255, 255, 255, 1)";
        }
      }
    </script>
  </body>
</html>
